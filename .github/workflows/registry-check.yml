name: Registry Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: registry-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  registry-check:
    name: Registry Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare environment
        uses: ./.github/actions/prepare

      - name: Run registry check
        run: pnpm registry:check
